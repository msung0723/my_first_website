<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnus Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <button id="sidebar-toggle" class="icon-btn" type="button"><i class="fa-solid fa-bars"></i></button>
            <img src="19155.png" alt="Magnus Logo" class="logo-image" id="logo-main">
        </div>

        <div class="nav-menu">
            <button id="nav-signup-btn" class="nav-btn" type="button">회원가입</button>
            <button id="nav-login-btn" class="nav-btn hidden" type="button">로그인</button>
            <div id="nav-profile-group" class="hidden">
                <div id="header-profile-img-wrapper">
                    <div id="default-avatar">?</div>
                    <img id="header-profile-img" src="" alt="Profile" class="hidden">
                </div>
                <button id="nav-profile-btn" class="nav-btn" type="button">프로필</button>
            </div>
        </div>
    </header>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>메뉴</h3>
            <button id="sidebar-close" class="icon-btn" type="button"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="sidebar-links">
            <li class="active"><a href="#" id="menu-main"><i class="fa-solid fa-house"></i> 메인 화면</a></li>
            <li><a href="#" id="menu-music"><i class="fa-solid fa-music"></i> 음악</a></li>
        </ul>
    </nav>

    <div id="auth-container" class="hidden auth-overlay">
        <div class="auth-box">
            <h2>회원가입</h2>
            <input type="text" id="signup-id" class="large-input" placeholder="아이디">
            <input type="password" id="signup-pw" class="large-input" placeholder="비밀번호">
            <button id="complete-signup" class="large-btn" type="button">가입 완료</button>
        </div>
    </div>

    <div id="login-container" class="hidden auth-overlay">
        <div class="auth-box">
            <h2>로그인</h2>
            <input type="text" id="login-id" class="large-input" placeholder="아이디">
            <input type="password" id="login-pw" class="large-input" placeholder="비밀번호">
            <button id="submit-login" class="large-btn" type="button">로그인하기</button>
        </div>
    </div>

    <div id="shortcut-modal" class="hidden auth-overlay">
        <div class="auth-box">
            <h2>즐겨찾기 추가</h2>
            <input type="text" id="shortcut-name" class="large-input" placeholder="사이트 이름">
            <input type="text" id="shortcut-url" class="large-input" placeholder="사이트 주소 (예: naver.com)">
            <button id="save-shortcut" class="large-btn" type="button">추가하기</button>
        </div>
    </div>

    <div id="playlist-editor-modal" class="hidden auth-overlay">
        <div class="auth-box playlist-editor-box">
            <div class="playlist-editor-header">
                <h2>재생목록 수정</h2>
                <button id="close-playlist-editor" class="icon-btn" type="button"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="playlist-editor-top">
                <select id="playlist-editor-select" class="large-input"></select>
                <input type="text" id="playlist-name-input" class="large-input" placeholder="재생목록 이름">
            </div>
            <div class="playlist-editor-actions">
                <button id="new-playlist-btn" class="nav-btn" type="button">새 재생목록</button>
                <button id="rename-playlist-btn" class="nav-btn" type="button">이름 저장</button>
                <button id="delete-playlist-btn" class="nav-btn gray" type="button">재생목록 삭제</button>
            </div>
            <div class="playlist-edit-list" id="playlist-edit-list"></div>
        </div>
    </div>

    <main id="main-page" class="welcome-container">
        <div class="main-content">
            <img src="19155.png" alt="Magnus Logo" class="main-center-logo">
            <h1 class="welcome-text"><span id="user-name">아무개</span>님 환영합니다</h1>
            <div id="shortcut-grid" class="shortcut-grid">
                <button id="add-shortcut-btn" class="add-btn" type="button"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>
    </main>

    <section id="profile-page" class="hidden">
        <div class="profile-container">
            <h2 class="section-title">계정 설정</h2>
            <div class="profile-layout">
                <div class="profile-left">
                    <div id="profile-image-setup" class="image-upload-box">
                        <i class="fa-solid fa-plus" id="preview-plus"></i>
                        <img id="profile-preview" src="" alt="Profile Preview" class="hidden">
                        <input type="file" id="image-input" accept="image/*" class="hidden">
                    </div>
                    <p class="info-text">사진을 눌러 변경하세요</p>
                    <div class="setting-item">
                        <label>테두리 색상</label>
                        <input type="color" id="profile-border-color" value="#000000">
                    </div>
                    <div class="setting-item">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rainbow-mode"> 무지개 애니메이션
                        </label>
                    </div>
                </div>
                <div class="profile-right">
                    <div class="input-group">
                        <label>이름 변경</label>
                        <input type="text" id="change-id" class="large-input" placeholder="새로운 이름 입력">
                    </div>
                    <div class="input-group">
                        <label>비밀번호 변경</label>
                        <input type="password" id="change-pw" class="large-input" placeholder="새로운 비밀번호 입력">
                    </div>
                    <div class="button-group">
                        <button id="save-settings" class="large-btn" type="button">설정 저장하기</button>
                        <button id="back-to-main" class="nav-btn gray" type="button">메인으로 돌아가기</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="music-page" class="hidden">
        <div class="music-layout">
            <div class="music-top-actions">
                <input type="file" id="music-file-input" accept="audio/*" multiple class="hidden">
                <button id="add-music-btn" class="nav-btn" type="button">노래 추가</button>
                <button id="edit-playlist-btn" class="nav-btn" type="button">재생목록 수정</button>
            </div>

            <div class="music-center">
                <span class="now-playing-label">Now Playing</span>
                <div class="record-wrapper">
                    <button class="record-disc" id="record-disc" type="button" aria-label="선택한 음악 재생">
                        <div class="cd-shine"></div>
                        <div class="record-label">
                            <div class="label-dot"></div>
                            <div class="label-ring ring-one"></div>
                            <div class="label-ring ring-two"></div>
                        </div>
                    </button>
                </div>
                <div class="record-hint" id="record-hint">재생할 음악을 선택한 뒤 음반을 눌러주세요</div>
                <div class="now-playing-title" id="now-playing-title">선택된 음악 없음</div>
            </div>

            <div class="music-playlist">
                <div class="playlist-switcher">
                    <button class="playlist-switch-btn" id="playlist-prev" type="button" aria-label="이전 재생목록">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                    <div class="playlist-name" id="playlist-name">기본 재생목록</div>
                    <button class="playlist-switch-btn" id="playlist-next" type="button" aria-label="다음 재생목록">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </div>
                <button class="playlist-arrow" id="playlist-up" type="button" aria-label="이전 곡">
                    <i class="fa-solid fa-chevron-up"></i>
                </button>
                <div class="playlist-items" id="playlist-items"></div>
                <button class="playlist-arrow" id="playlist-down" type="button" aria-label="다음 곡">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <div class="music-empty hidden" id="music-empty-state">업로드한 노래가 아직 없습니다</div>
            </div>
        </div>

        <audio id="music-audio" preload="metadata"></audio>
    </section>

    <script src="script.js"></script>
</body>
</html>
